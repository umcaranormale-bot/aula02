<!DOCTYPE html>
<html lang="pt-BR">
<head>
    
    <title>Cadastro de Produtos</title>
</head>
<body>
    <main>
        <form action="/salvar-produto" method="POST">
            <h2>Formulário de Cadastro para produto</h2> <br> <br>
            <label for="nome">Nome do produto:</label>
            <input type="text" id="nome_id" name="nome_produto" placeholder="Ex: Teclado Gamer Mecânico" required>
            <label for="preco">Preço do produto:</label>
            <input type="preco" id="precoid" name="preco_produto" placeholder="Ex: 50,00R$" step="0.01" min="0" required>
            <label for="data">Data de Lançamento do Produto:</label>
            <input type="date" id="data_id" name="data_produto" required> <br> <br>
            <label for="comentario">Comentários: </label> <br> <textarea></textarea>  <br> <br>
            <label for="arquivo">Upload de arquivo</label>
            <input type="file" id="arquivo_id" name="arquivo_produto" required> <br> <br>
            <button type="submit" style= "background-color: #054F77; border: 2px solid black;" >Cadastrar produto</button> <br> <br>
            <button type="reset" style= "background-color: #06c957; border: 2px solid black;">Limpar</button>
            




        </form>


    </main>
    
</body>
</html>
