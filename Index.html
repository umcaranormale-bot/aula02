<!DOCTYPE html>
<html lang="pt-BR">
<head>
    
    <title>Cadastro de Produtos</title>
</head>
<body>
    <main>
        <header style="font-size: 45px; text-align: center;">Loja de Informática</header>
        <form action="" method="">
            <h2>Formulário de Cadastro para produto</h2> <br> <br>
            <label for="nome_id">Nome do produto:</label>
            <input type="text" id="nome_id" name="nome_produto" placeholder="Ex: Teclado Gamer Mecânico" required>
            <label for="preco_id">Preço do produto:</label>
            <input type="number" id="preco_id" name="preco_produto" placeholder="Ex: 50,00R$" step="0.01" min="0" required>
            <label for="data_id">Data de Lançamento do Produto:</label>
            <input type="date" id="data_id" name="data_produto" required> <br> <br>
            <label for="comentario">Comentários: </label> <br> <textarea></textarea>  <br> <br>
            <label for="arquivo_id">Upload de arquivo</label>
            <input type="file" id="arquivo_id" name="arquivo_produto" required> <br> <br>
                <button type="submit">Cadastrar produto</button> <br> <br>
                <button type="reset">Limpar</button>
            <section><h1 style="text-align: center;">Sobre nós</h1>
                <p>Nós somos uma equipe totalmente especializada na venda de produtos eletrônicos internacionais, qualquer dúvida
                basta apenas acessar este link: 
                 <ul> <li><a href="www.google.com.br" target="_blank">https://www.ajudali.com.br//</a></li> </ul> 
                </p>  
            </section>    
        </form>


    </main>
    
</body>
</html>
